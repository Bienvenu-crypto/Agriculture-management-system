<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Agriculture Management System</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .container {
      max-width: 480px;
      background: white;
      padding: 40px 30px;
      border-radius: 24px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      border: 1px solid #e2e8f0;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      color: #0c4a6e; /* sky-900 */
      margin: 0 0 10px 0;
    }
    p {
      color: #64748b;
      font-size: 16px;
      line-height: 1.5;
      margin: 0 0 30px 0;
    }
    .btn {
      display: inline-block;
      background-color: #0bb177; /* emerald-600 */
      color: white;
      text-decoration: none;
      padding: 12px 30px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #099a67;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌱</div>
    <h1>You are Offline</h1>
    <p>Please check your internet connection. Some features of the Agriculture Management System require an active network connection to load updates.</p>
    <button class="btn" onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
